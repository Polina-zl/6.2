<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{% block title %}Новостной портал{% endblock title %}</title>

    <!-- Bootstrap + темизация -->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
</head>
<body>

    <!-- Навигация (как в примере Bootstrap Bare) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container px-5">
            <a class="navbar-brand" href="/news/">News Portal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/news/">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/">Админка</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Контент страницы -->
    <div class="container px-4 px-lg-5 mt-5">
        {% block content %}
        {% endblock content %}
    </div>

    <!-- Bootstrap JS (необязательно, но для навигации) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
